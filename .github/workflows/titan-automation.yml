name: Titan Stats otomasyonu

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/titan-automation.yml"

permissions:
  contents: write
  id-token: write

concurrency:
  group: titan-stats-automation
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Veriyi cek
        run: python3 build_data.py

      - name: Degisiklik varsa kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json)" ]; then
            git add data.json
            git commit -m "chore: Titan Stats verisini guncelle ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push
          else
            echo "Veri degismemis, commit yok."
          fi

      - name: Telegram bildirimlerini kontrol et
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('titan-stats-telegram');
            const response = await fetch('https://titan-stats.vercel.app/api/telegram-cron', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
            });
            const body = await response.text();
            if (!response.ok) core.setFailed(`Telegram kontrolu basarisiz (${response.status}): ${body}`);
            else core.info(body);
